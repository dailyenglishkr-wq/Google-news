name: Industry News Summary Email

on:
  schedule:
    # Runs Mon, Wed, Fri at 8:00am Korea time (KST = UTC+9, so 23:00 UTC previous day)
    - cron: '0 23 * * 0,2,4'
  workflow_dispatch: # allows you to run it manually anytime from GitHub

jobs:
  send-news-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run news summary script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python scripts/news_summary.py
